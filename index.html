    <style>
        body {
            margin: 0; background: #121212; color: #FFD700;
            font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; padding: 0;
        }
        .player-container {
            position: sticky; top: 0; background: #121212;
            width: 100%; max-width: 600px; padding: 20px 10px; 
            z-index: 10; border-bottom: 2px solid #FFD700;
            box-sizing: border-box;
        }
        .player-logo {
            position: absolute; top: 15px; right: 15px;     
            width: 45px; height: auto; z-index: 11;
            filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.4));
        }
        canvas {
            width: 100%; height: 100px; background: #000;
            border: 1px solid #FFD700; border-radius: 8px; margin-bottom: 15px;
        }
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }
        .playlist {
            width: 100%; max-width: 600px;
            margin: 0; list-style: none; padding: 10px;
            box-sizing: border-box;
        }
        .song-item {
            background: #1e1e1e; padding: 15px; margin-bottom: 8px;
            border-radius: 8px; cursor: pointer; transition: 0.2s;
            border: 1px solid #333; display: flex; justify-content: space-between;
            color: #eee;
        }
        .song-item.active {
            background: #FFD700; color: #000; font-weight: bold;
            border-color: #FFD700;
        }
        .song-info { font-size: 0.9rem; font-weight: bold; }
        .song-meta { font-size: 0.7rem; color: #888; }
        .tactical-header {
            width: 100%; background: #FFD700; color: #000;
            padding: 10px; font-weight: bold; text-align: center;
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem;
        }
        .editor-container {
            width: 100%; max-width: 600px; background: #000;
            padding: 20px; box-sizing: border-box;
        }
        .editor-controls {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 5px; margin-top: 15px;
        }
        .btn-tactical {
            background: #222; color: #FFD700; border: 1px solid #FFD700;
            padding: 12px 5px; text-transform: uppercase;
            font-size: 0.7rem; cursor: pointer; font-weight: bold;
        }
        .next-link {
            padding: 20px; text-decoration: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <img src="raysland.png" class="player-logo" alt="Logo">
        <h3 id="current-title" style="text-align:center; margin-top:0;">R2 MIXTAPE</h3>
        <canvas id="visualizer"></canvas>
        <audio id="audio" controls crossorigin="anonymous" 
        controlslist="nodownload"></audio>
    </div>

    <ul class="playlist" id="playlist">

        <li class="song-item" data-src="Duets easy 2.mp3">

        <li class="song-item" data-src="Duets easy 3.mp3">
            <span class="song-info">Best of Duet 3</span>
            <span class="song-meta">R2 STORAGE</span>
        </li>
        <li class="song-item" data-src="Decades 1.mp3">
            <span class="song-info">Decades 1</span>
            <span class="song-meta">R2 STORAGE</span>
        </li>
        <li class="song-item" data-src="Decades 2.mp3">
            <span class="song-info">Decades 2</span>
            <span class="song-meta">R2 STORAGE</span>
        </li>
        <li class="song-item" data-src="Poprock 1.mp3">
            <span class="song-info">Pop rock 1</span>

        </li>
        <li class="song-item" data-src="Poprock 2.mp3">

        </li>
        -->
        
        <li class="song-item" data-src="https://stream.zeno.fm/z7fgtpslunjuv">

            <span class="song-meta">LIVE STREAM</span>
        </li>
    </ul>

    <div class="tactical-header">Tactical Playlist Editor</div>
    <div class="editor-container">
        <div style="border: 1px dashed #444; padding: 10px; text-align: center;">
            <input type="file" id="file-input" accept="audio/*" multiple style="color: #FFD700; width: 100%;">
        </div>
        <div class="editor-controls">
            <button class="btn-tactical" onclick="prevSong()">PREV</button>
            <button class="btn-tactical" onclick="togglePlay()">PLAY</button>
            <button class="btn-tactical" onclick="togglePause()">PAUSE</button>
            <button class="btn-tactical" onclick="nextSong()">NEXT</button>
        </div>
    </div>
    
    <a href="list2.html" target="_blank" class="next-link">
        <font color="#FFD700">NEXT LIST →</font>
    </a>
    
    <script>
        // ==========================================
        // 1. CONFIGURATION
        // ==========================================
        
        const WORKER_URL = "https://raysland2bucket.eugall.workers.dev"; // Change this to your actual Worker URL

        const audio = document.getElementById('audio');
        const playlist = document.getElementById('playlist');
        const currentTitle = document.getElementById('current-title');
        const fileInput = document.getElementById('file-input');

        // Helper to format the URL
        function getFullUrl(path) {
            if (path.startsWith('http') || path.startsWith('blob:')) return path;
            return `${WORKER_URL}/${path}`;
        }
      
        // ==========================================
        // 2. PLAYER LOGIC
        // ==========================================
        function playThis(element) {
            const rawSource = element.getAttribute('data-src');
            const streamUrl = getFullUrl(rawSource);
            const title = element.querySelector('.song-info').innerText;
            
            document.querySelectorAll('.song-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            
            currentTitle.innerText = title;
            audio.src = streamUrl;
            audio.play();
            
            if (!audioCtx) initVisualizer();
        }

        playlist.addEventListener('click', function(e) {
            const item = e.target.closest('.song-item');
            if (item) playThis(item);
        });

        fileInput.addEventListener('change', function(e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                const url = URL.createObjectURL(file);
                const li = document.createElement('li');
                li.className = 'song-item';
                li.setAttribute('data-src', url);
                li.innerHTML = `<span class="song-info">${file.name}</span><span class="song-meta">LOCAL</span>`;
                playlist.appendChild(li);
            });
        });

        function togglePlay() { audio.play(); }
        function togglePause() { audio.pause(); }

        function nextSong() {
            const items = document.querySelectorAll('.song-item');
            let active = document.querySelector('.song-item.active');
            let next = active ? active.nextElementSibling : items[0];
            if (next && next.classList.contains('song-item')) playThis(next);
        }

        function prevSong() {
            const items = document.querySelectorAll('.song-item');
            let active = document.querySelector('.song-item.active');
            let prev = active ? active.previousElementSibling : items[items.length - 1];
            if (prev && prev.classList.contains('song-item')) playThis(prev);
        }

        // ==========================================
        // 3. VISUALIZER (CORS COMPATIBLE)
        // ==========================================
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        let audioCtx, analyzer, source, dataArray, bufferLength;

        function initVisualizer() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyzer = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(audio);
            source.connect(analyzer);
            analyzer.connect(audioCtx.destination);
            analyzer.fftSize = 64;
            bufferLength = analyzer.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            draw();
        }

        function draw() {
            requestAnimationFrame(draw);
            analyzer.getByteFrequencyData(dataArray);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const barWidth = (canvas.width / bufferLength) * 2;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                let barHeight = dataArray[i] / 2;
                ctx.fillStyle = `rgb(255, ${200 - barHeight}, 0)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth - 2, barHeight);
                x += barWidth;
            }
        }
        
        audio.onended = nextSong;
